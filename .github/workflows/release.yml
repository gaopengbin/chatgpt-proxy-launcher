name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build lightweight executable
        shell: powershell
        run: .\build.ps1

      - name: Package
        shell: powershell
        run: |
          Copy-Item README.md output\README.md
          Copy-Item LICENSE output\LICENSE
          Compress-Archive -Path output\ChatGPTProxyLauncher.exe,output\README.md,output\LICENSE -DestinationPath output\ChatGPTProxyLauncher-win-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPTProxyLauncher-win-x64
          path: output/ChatGPTProxyLauncher-win-x64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/ChatGPTProxyLauncher-win-x64.zip
          generate_release_notes: true
